plugins { id 'com.android.application' }

android {
    namespace 'com.booklegacy.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.booklegacy.app'
        minSdk 23
        targetSdk 35
        versionCode 317
        versionName '3.17'
    }

    signingConfigs {
        debugBookLegacy {
            storeFile file('../keystore/booklegacy-debug.jks')
            storePassword 'booklegacy'
            keyAlias 'booklegacydebug'
            keyPassword 'booklegacy'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debugBookLegacy
        }
        release {
            signingConfig signingConfigs.debugBookLegacy
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'com.google.android.gms:play-services-auth:21.2.0'
}
