name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
      - 'mobile.html'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Print BookLegacy APK SHA-1
        run: |
          echo "Use este SHA-1 no Firebase Android app com package com.booklegacy.app:"
          keytool -list -v -keystore android/keystore/booklegacy-debug.jks -storepass booklegacy -alias booklegacydebug | grep SHA1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookLegacy-v3-17-native-login-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
